    let currentExamQuestions = [];

    // Función para obtener preguntas aleatorias
    function getRandom(arr, n) {
        if (n >= arr.length) return [...arr];
        let shuffled = [...arr];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, n);
    }

    // Función que arranca el examen dependiendo la cantidad deseada por sección
    function startExam(n) {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'block';

        // Dividir el banco en las 5 secciones exactas
        const sec1 = questions.slice(0, 30);
        const sec2 = questions.slice(30, 60);
        const sec3 = questions.slice(60, 90);
        const sec4 = questions.slice(90, 120);
        const sec5 = questions.slice(120, 150);

        // Seleccionar N preguntas al azar de cada sección
        currentExamQuestions = [
            { titulo: "Sección 1: Aritmética y Números", preguntas: getRandom(sec1, n) },
            { titulo: "Sección 2: Álgebra", preguntas: getRandom(sec2, n) },
            { titulo: "Sección 3: Trigonometría y Geometría Analítica", preguntas: getRandom(sec3, n) },
            { titulo: "Sección 4: Análisis Matemático", preguntas: getRandom(sec4, n) },
            { titulo: "Sección 5: Probabilidad y Estadística", preguntas: getRandom(sec5, n) }
        ];

        renderExam();
    }

    // Renderizar el examen en el HTML
    function renderExam() {
        const container = document.getElementById('questions-container');
        container.innerHTML = ''; // Limpiar si había algo previo
        
        let globalIndex = 0; // Índice único para cada radio button de todo el examen

        currentExamQuestions.forEach((seccion) => {
            // Título de la Sección
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerText = seccion.titulo;
            container.appendChild(header);

            seccion.preguntas.forEach((pregunta) => {
                // Limpiar texto de "A)" para barajar bien
                pregunta.options = pregunta.options.map(opt => opt.replace(/^[A-D]\)\s*/, ''));
                const textoCorrectoOriginal = pregunta.options[pregunta.respuestaCorrecta];

                // Barajar opciones
                for (let i = pregunta.options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pregunta.options[i], pregunta.options[j]] = [pregunta.options[j], pregunta.options[i]];
                }
                pregunta.respuestaCorrecta = pregunta.options.indexOf(textoCorrectoOriginal);

                const questionBlock = document.createElement('div');
                questionBlock.className = 'question-block';

                const title = document.createElement('div');
                title.className = 'question-title';
                const cleanTitle = pregunta.q.replace(/\s*\]+\]/g, '');
                // Modificamos el título para que tenga un número secuencial nuevo
                title.innerText = `${globalIndex + 1}. ` + cleanTitle.replace(/^Reactivo \d+\.?\s*/, '');
                questionBlock.appendChild(title);

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = 'feedback-' + globalIndex;

                pregunta.options.forEach((opcion, optIndex) => {
                    const label = document.createElement('label');
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'q' + globalIndex; // Usar el índice global para que no haya conflicto
                    radio.value = optIndex;
                    
                    radio.addEventListener('change', function() {
                        feedbackDiv.style.display = 'block';
                        
                        const allRadios = document.getElementsByName('q' + this.name.substring(1));
                        allRadios.forEach(r => {
                            r.disabled = true;
                            r.parentElement.classList.add('disabled');
                        });

                        if (parseInt(this.value) === pregunta.respuestaCorrecta) {
                            feedbackDiv.className = 'feedback correct';
                            feedbackDiv.innerHTML = '<strong>¡Correcto!</strong><br><br><strong>Justificación:</strong> ' + pregunta.justificacion;
                        } else {
                            feedbackDiv.className = 'feedback incorrect';
                            const letraCorrecta = String.fromCharCode(65 + pregunta.respuestaCorrecta);
                            feedbackDiv.innerHTML = '<strong>Incorrecto.</strong> La respuesta correcta era la opción <strong>' + letraCorrecta + '</strong>.<br><br><strong>Justificación:</strong> ' + pregunta.justificacion;
                        }
                        
                        if (window.MathJax) {
                            MathJax.typesetPromise([feedbackDiv]).catch((err) => console.log('MathJax error: ', err));
                        }
                    });

                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(' ' + String.fromCharCode(65 + optIndex) + ') ' + opcion));
                    optionsDiv.appendChild(label);
                });

                questionBlock.appendChild(optionsDiv);
                questionBlock.appendChild(feedbackDiv);
                container.appendChild(questionBlock);
                globalIndex++;
            });
        });

        // Forzar a MathJax a procesar las preguntas inyectadas
        if (window.MathJax) {
            MathJax.typesetPromise([container]).catch((err) => console.log('MathJax error: ', err));
        }
    }

    // Calcular la calificación final
    function calculateGrade() {
        let score = 0;
        let answered = 0;
        let totalQuestions = 0;

        // Calcular cuántas preguntas hay en total en el examen actual
        currentExamQuestions.forEach(sec => totalQuestions += sec.preguntas.length);

        for(let i = 0; i < totalQuestions; i++){
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (selected) {
                answered++;
                
                // Encontrar a qué pregunta pertenece el índice "i"
                let count = 0;
                let foundQuestion = null;
                for(let s = 0; s < currentExamQuestions.length; s++) {
                    for(let p = 0; p < currentExamQuestions[s].preguntas.length; p++) {
                        if(count === i) {
                            foundQuestion = currentExamQuestions[s].preguntas[p];
                            break;
                        }
                        count++;
                    }
                    if(foundQuestion) break;
                }

                if (foundQuestion && parseInt(selected.value) === foundQuestion.respuestaCorrecta) {
                    score++;
                }
            }
        }

        if (answered < totalQuestions) {
            alert(`Has respondido ${answered} de ${totalQuestions} preguntas. No te preocupes, se calificarán las que ya respondiste.`);
        }

        const percentage = (score / totalQuestions) * 100;
        document.getElementById('final-grade').innerText = `${score} / ${totalQuestions} (${percentage.toFixed(1)}%)`;
        
        let feedback = "";
        if(percentage >= 90) feedback = "¡Excelente trabajo! Tienes un dominio sobresaliente.";
        else if(percentage >= 70) feedback = "Buen resultado, pero sigue puliendo tus áreas débiles.";
        else feedback = "Necesitas seguir estudiando intensamente para mejorar este puntaje.";
        
        document.getElementById('feedback-message').innerText = feedback;
        document.getElementById('result-container').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
